<!DOCTYPE html>
<html>
<head>

    <title>scanIT</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

    <h1>scanIT</h1>

    <!-- LOGIN -->
    <div class="card" id="loginCard">

        <h2>Teacher Login</h2>

        <input type="email" id="email" placeholder="Enter University Email">
        <input type="password" id="password" placeholder="Enter Password">

        <button onclick="login()">Login</button>

    </div>

    <!-- DASHBOARD - Meaning dito nyo makkita ang section nyo. -->
    <div id="dashboard" style="display:none;">

        <div class="card">
            <h2>Select Section</h2>
            <select id="section">
                <option>IT 1201</option>
                <option>IT 1202</option>
                <option>IT 1203</option>
                <option>IT 1204</option>
                <option>IT 1205</option>
                <option>IT 1206</option>
                <option>IT 1207</option>
                <option>IT 1208</option>
                <option>IT 1209</option>
                <option>IT 1210</option>
                <option>IT 1211</option>
                <option>IT 1212</option>
                <option>IT 1213</option>
                <option>IT 1214</option>
                <option>IT 1215</option>
            </select>
        </div>

        <!-- Just like the first one dito select ng subject.-->
        <div class="card">
            <h2>Select Subject</h2>
            <select id="subject">
                <option>Data Structures and Algorithms</option>
                <option>Discrete Mathematics</option>
                <option>Arts Aprreciation</option>
                <option>Science, Technology And Society </option>
                <option>Integral Calculus</option>
                <option>Advance Computer Programming</option>
            </select>
        </div>

        <!-- QR SCANNER -->
        <input
            type="text"
            id="scanner"
            placeholder="Scan QR"
            style="opacity:0; position:absolute;"
        >

        <!-- STUDENT INFORMATION -->
        <div class="card student-layout">

            <div class="student-image-section">
                <img id="studentImage" src="https://via.placeholder.com/250">
            </div>

            <div class="student-info-section">

                <h2>Student Information</h2>

                <p><strong>Name:</strong> <span id="studentName"></span></p>
                <p><strong>SR-Code:</strong> <span id="studentSR"></span></p>
                <p><strong>Program:</strong> <span id="studentCourse"></span></p>
                <p><strong>Last Scan:</strong> <span id="studentTime"></span></p>

            </div>

        </div>

        <!-- ATTENDANCE TABLE -->
        <div class="card">

            <h2>Attendance Records</h2>

            <div class="table-container">

                <table>

                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>SR-Code</th>
                            <th>Program</th>
                            <th>Time In</th>
                            <th>Time Out</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody id="attendanceTable"></tbody>

                </table>

            </div>

        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- 🔥 QR SCANNER CONNECT FIX (IMPORTANT) -->
<!-- ===================================== -->
<script>
document.addEventListener("DOMContentLoaded", function () {

    const scanner = document.getElementById("scanner");

    // ENTER key trigger (most QR scanners use this)
    scanner.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
            scanQRCode();
        }
    });

    // backup trigger
    scanner.addEventListener("input", function () {
        if (scanner.value.length > 3) {
            setTimeout(scanQRCode, 100);
        }
    });

});
</script>

<!-- CONNECT JAVASCRIPT -->
<script src="script.js"></script>

</body>
</html>
